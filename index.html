<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OX Experten finden</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --ox-bg: #2b3340;
      --ox-surface: #343d4d;
      --ox-surface-hover: #3c4656;
      --ox-border: #4a5568;
      --ox-text: #e8ecf1;
      --ox-text-secondary: #9aa5b4;
      --ox-accent: #7bafd4;
      --ox-blue: #7bafd4;
      --ox-green: #7cc87c;
      --ox-orange: #e8a04a;
      --radius: 12px;
      --shadow: 0 2px 20px rgba(0,0,0,0.25);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--ox-bg);
      color: var(--ox-text);
      height: 100vh;
      overflow: hidden;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 320px;
      min-width: 320px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--ox-border);
      background: var(--ox-bg);
      z-index: 1000;
    }

    .sidebar-header {
      padding: 24px 24px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      background: var(--ox-text);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ox-bg);
      font-weight: 800;
      font-size: 14px;
      letter-spacing: -0.5px;
    }

    .brand-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--ox-text);
    }

    .brand-sub {
      font-size: 12px;
      color: var(--ox-text-secondary);
      font-weight: 400;
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 16px;
      padding: 0 24px;
    }

    .search-icon {
      position: absolute;
      left: 36px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--ox-text-secondary);
      pointer-events: none;
    }

    .search {
      width: 100%;
      padding: 10px 12px 10px 36px;
      border: 1px solid var(--ox-border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--ox-surface);
      color: var(--ox-text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search::placeholder {
      color: var(--ox-text-secondary);
    }

    .search:focus {
      border-color: var(--ox-accent);
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 6px;
      padding: 0 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border: 1px solid var(--ox-border);
      border-radius: 20px;
      background: transparent;
      color: var(--ox-text-secondary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: var(--ox-text);
      color: var(--ox-text);
    }

    .filter-btn.active {
      background: var(--ox-text);
      border-color: var(--ox-text);
      color: var(--ox-bg);
    }

    .results-count {
      padding: 0 24px;
      font-size: 12px;
      color: var(--ox-text-secondary);
      margin-bottom: 12px;
    }

    /* ── Location List ── */
    .location-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }

    .location-list::-webkit-scrollbar {
      width: 4px;
    }

    .location-list::-webkit-scrollbar-thumb {
      background: var(--ox-border);
      border-radius: 4px;
    }

    .location-card {
      padding: 16px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .location-card:hover {
      background: var(--ox-surface);
    }

    .location-card.active {
      background: var(--ox-surface);
      border-color: var(--ox-border);
    }

    .location-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--ox-text);
    }

    .location-type {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }

    .type-praxis {
      background: rgba(106, 155, 197, 0.15);
      color: var(--ox-blue);
    }

    .type-klinik {
      background: rgba(109, 191, 109, 0.15);
      color: var(--ox-green);
    }

    .type-arbeitgeber {
      background: rgba(232, 148, 58, 0.15);
      color: var(--ox-orange);
    }

    .location-address {
      font-size: 13px;
      color: var(--ox-text-secondary);
      line-height: 1.4;
    }

    .location-desc {
      font-size: 13px;
      color: var(--ox-text);
      margin-top: 6px;
      line-height: 1.4;
      opacity: 0.85;
    }

    .location-contact {
      font-size: 12px;
      color: var(--ox-accent);
      margin-top: 4px;
    }

    /* ── Map ── */
    .map-container {
      flex: 1;
      position: relative;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius) !important;
      box-shadow: var(--shadow) !important;
      padding: 0 !important;
      background: var(--ox-surface) !important;
      color: var(--ox-text) !important;
    }

    .leaflet-popup-content {
      margin: 16px !important;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
      font-size: 13px !important;
      line-height: 1.5 !important;
    }

    .leaflet-popup-tip {
      box-shadow: none !important;
      background: var(--ox-surface) !important;
    }

    .popup-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
      color: var(--ox-text);
    }

    .popup-address {
      color: var(--ox-text-secondary);
      margin-bottom: 6px;
    }

    .popup-contact a {
      color: var(--ox-accent);
      text-decoration: none;
    }

    /* Map tile tint — steel blue-gray */
    .map-tiles {
      filter: brightness(0.75) saturate(0.4) contrast(1.1);
    }

    /* Leaflet controls dark */
    .leaflet-control-zoom a {
      background: var(--ox-bg) !important;
      color: var(--ox-text) !important;
      border-color: var(--ox-border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--ox-surface) !important;
    }

    .leaflet-control-attribution {
      background: rgba(43, 51, 64, 0.85) !important;
      color: var(--ox-text-secondary) !important;
    }

    .leaflet-control-attribution a {
      color: var(--ox-text-secondary) !important;
    }

    /* Custom markers */
    .custom-marker {
      background: none;
      border: none;
    }

    .marker-pin {
      width: 32px;
      height: 32px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }

    .marker-pin.praxis { background: var(--ox-blue); }
    .marker-pin.klinik { background: var(--ox-green); }
    .marker-pin.arbeitgeber { background: var(--ox-orange); }

    .marker-pin-inner {
      transform: rotate(45deg);
      color: white;
      font-size: 14px;
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 24px;
      color: var(--ox-text-secondary);
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .app {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        min-width: 100%;
        height: 45vh;
        border-right: none;
        border-bottom: 1px solid var(--ox-border);
      }

      .map-container {
        height: 55vh;
      }
    }

    /* ── iframe mode (no brand header) ── */
    .embed-mode .brand { display: none; }
    .embed-mode .sidebar-header { padding-top: 16px; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <div class="brand-logo">OX</div>
          <div>
            <div class="brand-text">Standorte finden</div>
            <div class="brand-sub">OX Experten & Arbeitgeber in deiner Nähe</div>
          </div>
        </div>
      </div>

      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search" id="search" placeholder="Stadt, Name oder PLZ suchen..." />
      </div>

      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Alle</button>
        <button class="filter-btn" data-filter="Praxis">Praxis</button>
        <button class="filter-btn" data-filter="Klinik">Klinik</button>
        <button class="filter-btn" data-filter="Arbeitgeber">Arbeitgeber</button>
      </div>

      <div class="results-count" id="results-count"></div>

      <div class="location-list" id="location-list"></div>
    </aside>

    <!-- Map -->
    <div class="map-container">
      <div id="map"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    (() => {
      // ── State ──
      let locations = [];
      let markers = {};
      let activeFilter = 'all';
      let searchQuery = '';
      let activeCardId = null;

      // ── Embed mode detection ──
      if (window.self !== window.top) {
        document.getElementById('app').classList.add('embed-mode');
      }

      // ── Map setup ──
      const map = L.map('map', {
        zoomControl: false,
        attributionControl: true
      }).setView([51.1657, 10.4515], 6);

      L.control.zoom({ position: 'topright' }).addTo(map);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19,
        className: 'map-tiles'
      }).addTo(map);

      // ── Custom marker icon ──
      function createMarkerIcon(type) {
        const typeClass = (type || 'Praxis').toLowerCase();
        const icons = {
          praxis: '⚕',
          klinik: '🏥',
          arbeitgeber: '💼'
        };
        return L.divIcon({
          className: 'custom-marker',
          html: `<div class="marker-pin ${typeClass}"><span class="marker-pin-inner">${icons[typeClass] || '📍'}</span></div>`,
          iconSize: [32, 32],
          iconAnchor: [16, 32],
          popupAnchor: [0, -32]
        });
      }

      // ── Popup HTML ──
      function popupHTML(loc) {
        const contactLine = loc.contact
          ? `<div class="popup-contact"><a href="mailto:${loc.contact}">${loc.contact}</a></div>`
          : '';
        return `
          <div class="popup-name">${loc.name}</div>
          <div class="popup-address">${loc.address}</div>
          ${loc.description ? `<div>${loc.description}</div>` : ''}
          ${contactLine}
        `;
      }

      // ── Render locations list ──
      function renderList(filtered) {
        const list = document.getElementById('location-list');
        const count = document.getElementById('results-count');

        count.textContent = `${filtered.length} Standort${filtered.length !== 1 ? 'e' : ''} gefunden`;

        if (filtered.length === 0) {
          list.innerHTML = `
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <div>Keine Standorte gefunden</div>
            </div>`;
          return;
        }

        list.innerHTML = filtered.map((loc, i) => {
          const typeClass = `type-${(loc.type || 'praxis').toLowerCase()}`;
          return `
            <div class="location-card ${activeCardId === i ? 'active' : ''}" data-index="${i}">
              <div class="location-name">${loc.name}</div>
              <span class="location-type ${typeClass}">${loc.type || 'Praxis'}</span>
              <div class="location-address">${loc.address}</div>
              ${loc.description ? `<div class="location-desc">${loc.description}</div>` : ''}
              ${loc.contact ? `<div class="location-contact">${loc.contact}</div>` : ''}
            </div>`;
        }).join('');

        // Card click handlers
        list.querySelectorAll('.location-card').forEach(card => {
          card.addEventListener('click', () => {
            const idx = parseInt(card.dataset.index);
            const loc = filtered[idx];
            flyToLocation(loc);
            setActiveCard(idx);
          });
        });
      }

      // ── Fly to location ──
      function flyToLocation(loc) {
        map.flyTo([loc.lat, loc.lng], 13, { duration: 0.8 });
        const key = `${loc.lat}-${loc.lng}`;
        if (markers[key]) {
          markers[key].openPopup();
        }
      }

      // ── Set active card ──
      function setActiveCard(idx) {
        activeCardId = idx;
        document.querySelectorAll('.location-card').forEach(c => c.classList.remove('active'));
        const card = document.querySelector(`.location-card[data-index="${idx}"]`);
        if (card) {
          card.classList.add('active');
          card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      }

      // ── Update markers on map ──
      function updateMarkers(filtered) {
        // Clear existing
        Object.values(markers).forEach(m => map.removeLayer(m));
        markers = {};

        filtered.forEach((loc, i) => {
          const marker = L.marker([loc.lat, loc.lng], {
            icon: createMarkerIcon(loc.type)
          }).addTo(map);

          marker.bindPopup(popupHTML(loc), { maxWidth: 260 });
          marker.on('click', () => setActiveCard(i));

          markers[`${loc.lat}-${loc.lng}`] = marker;
        });

        // Fit bounds
        if (filtered.length > 0) {
          const group = L.featureGroup(Object.values(markers));
          map.fitBounds(group.getBounds().pad(0.15), { maxZoom: 12 });
        }
      }

      // ── Filter & Search ──
      function getFiltered() {
        return locations.filter(loc => {
          const matchesFilter = activeFilter === 'all' || loc.type === activeFilter;
          const q = searchQuery.toLowerCase();
          const matchesSearch = !q ||
            loc.name.toLowerCase().includes(q) ||
            loc.address.toLowerCase().includes(q) ||
            (loc.description || '').toLowerCase().includes(q);
          return matchesFilter && matchesSearch;
        });
      }

      function refresh() {
        activeCardId = null;
        const filtered = getFiltered();
        renderList(filtered);
        updateMarkers(filtered);
      }

      // ── Event listeners ──
      document.getElementById('search').addEventListener('input', e => {
        searchQuery = e.target.value;
        refresh();
      });

      document.getElementById('filters').addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        refresh();
      });

      // ── Config ──
      // Set your n8n webhook URL here (production), falls back to local JSON
      const WEBHOOK_URL = 'http://46.224.200.248:5678/webhook/ox-locations';

      // ── Load data ──
      const dataUrl = WEBHOOK_URL || 'locations.json';
      fetch(dataUrl)
        .then(r => r.json())
        .then(data => {
          locations = Array.isArray(data) ? data : [];
          refresh();
        })
        .catch(err => {
          console.error('Failed to load from:', dataUrl, err);
          // Fallback to local JSON if webhook fails
          if (WEBHOOK_URL) {
            fetch('locations.json')
              .then(r => r.json())
              .then(data => { locations = data; refresh(); })
              .catch(() => {
                document.getElementById('location-list').innerHTML = `
                  <div class="empty-state">
                    <div>Standorte konnten nicht geladen werden.</div>
                  </div>`;
              });
          } else {
            document.getElementById('location-list').innerHTML = `
              <div class="empty-state">
                <div>Standorte konnten nicht geladen werden.</div>
              </div>`;
          }
        });
    })();
  </script>
</body>
</html>
